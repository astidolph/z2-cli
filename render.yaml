services:
  - type: web
    name: z2-cli
    runtime: docker
    region: frankfurt
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
